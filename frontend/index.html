<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BlockEd Demo</title>
</head>
<body>
    <h1>BlockEd: Blockchain for Children</h1>

    <h2>Create Project</h2>
    <input type="text" id="projectName" placeholder="Project Name">
    <button onclick="createProject()">Create Project</button>

    <h2>Donate</h2>
    <input type="number" id="projectId" placeholder="Project ID">
    <input type="number" id="donationAmount" placeholder="Amount (ETH)">
    <button onclick="donate()">Donate</button>

    <h2>Vote on Proposal</h2>
    <input type="number" id="proposalId" placeholder="Proposal ID">
    <button onclick="voteProposal()">Vote</button>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.0.0/dist/ethers.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
